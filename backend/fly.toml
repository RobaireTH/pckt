app = "pckt-backend"
primary_region = "iad"

[build]
  dockerfile = "../Dockerfile"

[env]
  PORT = "8080"
  RUST_LOG = "pckt_backend=info,tower_http=info"

[[mounts]]
  source = "pckt_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
