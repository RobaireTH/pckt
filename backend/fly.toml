app = "pckt-backend"
primary_region = "iad"

[build]
  dockerfile = "../Dockerfile"

[env]
  PORT = "8080"
  CKB_NETWORK = "testnet"
  CKB_RPC_URL = "https://testnet.ckb.dev/rpc"
  CKB_INDEXER_URL = "https://testnet.ckb.dev/rpc"
  DATABASE_URL = "sqlite:///data/pckt.db"
  PRICE_FEED_URL = "https://min-api.cryptocompare.com/data/price?fsym=CKB&tsyms=USD"
  SHORTLINK_BASE = "https://pckt-backend.fly.dev"
  PACKET_LOCK_CODE_HASH = "0xd32c718bf52729197811c5077330719d801e2fddf81eec6407c5005151f798f1"
  PACKET_LOCK_HASH_TYPE = "data1"
  PACKET_LOCK_OUT_POINT_TX = "0xb1d1b8994b3b929fbe75beda7b066e22ace8c189ca8e21dabe8c6d533647c833"
  PACKET_LOCK_OUT_POINT_INDEX = "0"
  ALLOWED_ORIGINS = "https://sendpckt.robaireth.dev,https://sendpckt.vercel.app"
  RUST_LOG = "pckt_backend=info,tower_http=info"

[[mounts]]
  source = "pckt_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
