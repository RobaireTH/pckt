app = "pckt-backend"
primary_region = "iad"

[build]
  dockerfile = "../Dockerfile"

[env]
  PORT = "8080"
  CKB_NETWORK = "testnet"
  CKB_RPC_URL = "https://testnet.ckb.dev/rpc"
  CKB_INDEXER_URL = "https://testnet.ckb.dev/rpc"
  DATABASE_URL = "sqlite:///data/pckt.db"
  PRICE_FEED_URL = "https://min-api.cryptocompare.com/data/price?fsym=CKB&tsyms=USD"
  SHORTLINK_BASE = "https://pckt-backend.fly.dev"
  PACKET_LOCK_CODE_HASH = "0x7f55658a3527fb98403e845c2eff708096d342086fcd1e474457f9ddbb7c6496"
  PACKET_LOCK_HASH_TYPE = "data1"
  PACKET_LOCK_OUT_POINT_TX = "0x8b167f6fb6b1dfead002639e373c3ace760325a5990bdc3e4c0b52536541a0dc"
  PACKET_LOCK_OUT_POINT_INDEX = "0"
  ALLOWED_ORIGINS = "https://sendpckt.robaireth.dev,https://sendpckt.vercel.app"
  RUST_LOG = "pckt_backend=info,tower_http=info"

[[mounts]]
  source = "pckt_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
